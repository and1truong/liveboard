version: "2"

linters:
  disable-all: true
  enable:
    # Correctness
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    # Code quality
    - revive
    - misspell
    - whitespace
    # Safety
    - bodyclose
    - noctx
    # Complexity
    - cyclop
    - funlen
    - gocognit
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable:
        - shadow
        - printf
        - unreachable
    cyclop:
      max-complexity: 15
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 20
    misspell:
      locale: US
  exclusions:
    rules:
      - path: "_test\\.go$"
        linters:
          - funlen
          - gocognit
          - cyclop
          - bodyclose
          - noctx
      - path: "internal/parser/"
        linters:
          - cyclop
          - gocognit
          - funlen
      - path: "internal/writer/"
        linters:
          - gocognit

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/and1truong/liveboard

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
