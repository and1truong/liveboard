<?xml version="1.0" encoding="UTF-8"?>
<svg width="480" height="320" viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
  <!-- LiveBoard Logo — Primary (stacked) — Dark background variant -->

  <!-- Board container -->
  <rect x="138" y="20" width="204" height="168" rx="16" fill="none" stroke="#818cf8" stroke-width="2.5"/>

  <!-- Column dividers -->
  <line x1="207" y1="38" x2="207" y2="172" stroke="#818cf8" stroke-width="0.7" opacity="0.2"/>
  <line x1="269" y1="38" x2="269" y2="172" stroke="#818cf8" stroke-width="0.7" opacity="0.2"/>

  <!-- Column 1: 3 cards -->
  <rect x="152" y="44" width="48" height="12" rx="2.5" fill="#818cf8" opacity="0.5"/>
  <rect x="152" y="61" width="48" height="12" rx="2.5" fill="#818cf8" opacity="0.5"/>
  <rect x="152" y="78" width="48" height="12" rx="2.5" fill="#818cf8" opacity="0.5"/>

  <!-- Column 2: 2 cards -->
  <rect x="214" y="44" width="48" height="12" rx="2.5" fill="#818cf8" opacity="0.7"/>
  <rect x="214" y="61" width="48" height="12" rx="2.5" fill="#818cf8" opacity="0.7"/>

  <!-- Column 3: 1 card -->
  <rect x="276" y="44" width="48" height="12" rx="2.5" fill="#818cf8"/>

  <!-- Markdown hash watermark -->
  <text x="160" y="172" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="24" font-weight="700" fill="#818cf8" opacity="0.08">#</text>

  <!-- Live broadcast indicator -->
  <circle cx="332" cy="30" r="7" fill="#818cf8" opacity="0.7"/>
  <circle cx="332" cy="30" r="4.5" fill="#818cf8"/>
  <circle cx="332" cy="30" r="2" fill="#ffffff"/>
  <path d="M341 21 A13 13 0 0 1 341 39" fill="none" stroke="#818cf8" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
  <path d="M346 16 A19 19 0 0 1 346 44" fill="none" stroke="#818cf8" stroke-width="1.3" stroke-linecap="round" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="240" y="248" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="46" letter-spacing="-1">
    <tspan font-weight="600" fill="#818cf8">Live</tspan><tspan font-weight="300" fill="#e0e7ff">Board</tspan>
  </text>

  <!-- Tagline -->
  <text x="240" y="274" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="11" fill="#a5b4fc" letter-spacing="2.5" font-weight="400" opacity="0.6">MARKDOWN-NATIVE KANBAN</text>
</svg>
