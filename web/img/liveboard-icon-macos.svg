<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- LiveBoard macOS App Icon — 1024×1024 -->
  <!-- Full-bleed square; macOS applies squircle mask -->
  <!-- Bold 3-column kanban, optimized for dock readability -->

  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E8EAED"/>
    </linearGradient>

    <!-- Column shadows -->
    <filter id="colShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <!-- Card shadows -->
    <filter id="cardShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background: warm light gray -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle top edge highlight -->
  <rect x="0" y="0" width="1024" height="2" fill="white" opacity="0.8"/>

  <!-- ── Column 1 — Blue ── -->
  <g filter="url(#colShadow)">
    <rect x="120" y="160" width="240" height="704" rx="28" fill="#4285F4"/>
  </g>
  <!-- Header bar -->
  <rect x="148" y="200" width="120" height="14" rx="7" fill="white" opacity="0.5"/>
  <!-- Cards -->
  <g filter="url(#cardShadow)">
    <rect x="148" y="248" width="184" height="120" rx="18" fill="white"/>
  </g>
  <rect x="172" y="276" width="100" height="12" rx="6" fill="#4285F4" opacity="0.7"/>
  <rect x="172" y="298" width="136" height="10" rx="5" fill="#4285F4" opacity="0.2"/>
  <rect x="172" y="318" width="50" height="20" rx="10" fill="#E8F0FE"/>

  <g filter="url(#cardShadow)">
    <rect x="148" y="392" width="184" height="100" rx="18" fill="white"/>
  </g>
  <rect x="172" y="420" width="120" height="12" rx="6" fill="#4285F4" opacity="0.7"/>
  <rect x="172" y="442" width="136" height="10" rx="5" fill="#4285F4" opacity="0.2"/>

  <g filter="url(#cardShadow)">
    <rect x="148" y="516" width="184" height="80" rx="18" fill="white"/>
  </g>
  <rect x="172" y="540" width="90" height="12" rx="6" fill="#4285F4" opacity="0.7"/>

  <!-- ── Column 2 — Amber/Orange ── -->
  <g filter="url(#colShadow)">
    <rect x="392" y="160" width="240" height="704" rx="28" fill="#F9AB00"/>
  </g>
  <rect x="420" y="200" width="100" height="14" rx="7" fill="white" opacity="0.5"/>

  <g filter="url(#cardShadow)">
    <rect x="420" y="248" width="184" height="100" rx="18" fill="white"/>
  </g>
  <rect x="444" y="276" width="110" height="12" rx="6" fill="#F9AB00" opacity="0.7"/>
  <rect x="444" y="298" width="136" height="10" rx="5" fill="#F9AB00" opacity="0.2"/>

  <g filter="url(#cardShadow)">
    <rect x="420" y="372" width="184" height="130" rx="18" fill="white"/>
  </g>
  <rect x="444" y="400" width="130" height="12" rx="6" fill="#F9AB00" opacity="0.7"/>
  <rect x="444" y="422" width="136" height="10" rx="5" fill="#F9AB00" opacity="0.2"/>
  <rect x="444" y="444" width="100" height="10" rx="5" fill="#F9AB00" opacity="0.15"/>
  <rect x="444" y="468" width="46" height="20" rx="10" fill="#FEF7E0"/>

  <!-- ── Column 3 — Green ── -->
  <g filter="url(#colShadow)">
    <rect x="664" y="160" width="240" height="704" rx="28" fill="#34A853"/>
  </g>
  <rect x="692" y="200" width="80" height="14" rx="7" fill="white" opacity="0.5"/>

  <g filter="url(#cardShadow)">
    <rect x="692" y="248" width="184" height="110" rx="18" fill="white"/>
  </g>
  <rect x="716" y="276" width="90" height="12" rx="6" fill="#34A853" opacity="0.7"/>
  <rect x="716" y="298" width="136" height="10" rx="5" fill="#34A853" opacity="0.2"/>
  <rect x="716" y="318" width="56" height="20" rx="10" fill="#E6F4EA"/>

  <g filter="url(#cardShadow)">
    <rect x="692" y="382" width="184" height="80" rx="18" fill="white"/>
  </g>
  <rect x="716" y="406" width="120" height="12" rx="6" fill="#34A853" opacity="0.7"/>

  <g filter="url(#cardShadow)">
    <rect x="692" y="486" width="184" height="100" rx="18" fill="white"/>
  </g>
  <rect x="716" y="510" width="100" height="12" rx="6" fill="#34A853" opacity="0.7"/>
  <rect x="716" y="532" width="136" height="10" rx="5" fill="#34A853" opacity="0.15"/>
</svg>
