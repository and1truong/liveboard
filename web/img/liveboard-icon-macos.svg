<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- LiveBoard macOS App Icon — 1024×1024 -->
  <!-- Full-bleed square canvas; macOS applies squircle mask -->
  <!-- ~12% padding for mask safety -->

  <defs>
    <!-- Background gradient: Google blue tones, top-center light source -->
    <linearGradient id="bgGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5B9BF7"/>
      <stop offset="100%" stop-color="#3367D6"/>
    </linearGradient>

    <!-- Board surface: warm white with subtle depth -->
    <linearGradient id="boardGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F3F4"/>
    </linearGradient>

    <!-- Board shadow: top-center light -->
    <filter id="boardShadow" x="-8%" y="-5%" width="116%" height="125%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1A3A6E" flood-opacity="0.35"/>
    </filter>

    <!-- Card shadow: subtle lift -->
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1A3A6E" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Inner highlight (top-center light source) -->
  <rect x="2" y="2" width="1020" height="1020" rx="2" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="3"/>

  <!-- ── Board container ── -->
  <g filter="url(#boardShadow)">
    <rect x="130" y="170" width="764" height="690" rx="40" fill="url(#boardGrad)"/>
  </g>
  <rect x="130" y="170" width="764" height="690" rx="40" fill="none" stroke="#DADCE0" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Column dividers -->
  <line x1="385" y1="230" x2="385" y2="810" stroke="#E8EAED" stroke-width="2"/>
  <line x1="639" y1="230" x2="639" y2="810" stroke="#E8EAED" stroke-width="2"/>

  <!-- ══ Column 1 — Blue (#4285F4) ══ -->
  <!-- Header -->
  <rect x="166" y="208" width="184" height="10" rx="5" fill="#4285F4"/>

  <!-- Card 1 (tall) -->
  <g filter="url(#cardShadow)">
    <rect x="166" y="240" width="184" height="124" rx="14" fill="white"/>
  </g>
  <rect x="182" y="260" width="100" height="11" rx="4" fill="#4285F4" opacity="0.75"/>
  <rect x="182" y="280" width="152" height="8" rx="3" fill="#4285F4" opacity="0.18"/>
  <rect x="182" y="296" width="120" height="8" rx="3" fill="#4285F4" opacity="0.12"/>
  <rect x="182" y="322" width="42" height="18" rx="9" fill="#E8F0FE"/>
  <rect x="230" y="322" width="52" height="18" rx="9" fill="#E8F0FE"/>

  <!-- Card 2 (medium) -->
  <g filter="url(#cardShadow)">
    <rect x="166" y="384" width="184" height="100" rx="14" fill="white"/>
  </g>
  <rect x="182" y="404" width="120" height="11" rx="4" fill="#4285F4" opacity="0.75"/>
  <rect x="182" y="424" width="152" height="8" rx="3" fill="#4285F4" opacity="0.18"/>
  <rect x="182" y="448" width="38" height="18" rx="9" fill="#FBBC05" opacity="0.25"/>

  <!-- Card 3 (short) -->
  <g filter="url(#cardShadow)">
    <rect x="166" y="504" width="184" height="78" rx="14" fill="white"/>
  </g>
  <rect x="182" y="524" width="140" height="11" rx="4" fill="#4285F4" opacity="0.75"/>
  <rect x="182" y="544" width="152" height="8" rx="3" fill="#4285F4" opacity="0.12"/>

  <!-- ══ Column 2 — Red (#EA4335) ══ -->
  <!-- Header -->
  <rect x="420" y="208" width="184" height="10" rx="5" fill="#EA4335"/>

  <!-- Card 1 -->
  <g filter="url(#cardShadow)">
    <rect x="420" y="240" width="184" height="114" rx="14" fill="white"/>
  </g>
  <rect x="436" y="260" width="130" height="11" rx="4" fill="#EA4335" opacity="0.75"/>
  <rect x="436" y="280" width="152" height="8" rx="3" fill="#EA4335" opacity="0.18"/>
  <rect x="436" y="296" width="110" height="8" rx="3" fill="#EA4335" opacity="0.12"/>
  <rect x="436" y="316" width="46" height="18" rx="9" fill="#FCE8E6"/>

  <!-- Card 2 -->
  <g filter="url(#cardShadow)">
    <rect x="420" y="374" width="184" height="90" rx="14" fill="white"/>
  </g>
  <rect x="436" y="394" width="110" height="11" rx="4" fill="#EA4335" opacity="0.75"/>
  <rect x="436" y="414" width="152" height="8" rx="3" fill="#EA4335" opacity="0.15"/>
  <rect x="436" y="430" width="80" height="8" rx="3" fill="#EA4335" opacity="0.10"/>

  <!-- ══ Column 3 — Green (#34A853) ══ -->
  <!-- Header -->
  <rect x="674" y="208" width="184" height="10" rx="5" fill="#34A853"/>

  <!-- Card 1 -->
  <g filter="url(#cardShadow)">
    <rect x="674" y="240" width="184" height="100" rx="14" fill="white"/>
  </g>
  <rect x="690" y="260" width="90" height="11" rx="4" fill="#34A853" opacity="0.70"/>
  <rect x="690" y="280" width="152" height="8" rx="3" fill="#34A853" opacity="0.18"/>
  <rect x="690" y="304" width="46" height="18" rx="9" fill="#E6F4EA"/>

  <!-- Card 2 -->
  <g filter="url(#cardShadow)">
    <rect x="674" y="360" width="184" height="78" rx="14" fill="white"/>
  </g>
  <rect x="690" y="380" width="110" height="11" rx="4" fill="#34A853" opacity="0.70"/>
  <rect x="690" y="400" width="140" height="8" rx="3" fill="#34A853" opacity="0.15"/>

  <!-- Card 3 -->
  <g filter="url(#cardShadow)">
    <rect x="674" y="458" width="184" height="90" rx="14" fill="white"/>
  </g>
  <rect x="690" y="478" width="130" height="11" rx="4" fill="#34A853" opacity="0.70"/>
  <rect x="690" y="498" width="152" height="8" rx="3" fill="#34A853" opacity="0.15"/>
  <rect x="690" y="514" width="60" height="8" rx="3" fill="#34A853" opacity="0.10"/>

  <!-- ── Live indicator dot (top-right, yellow accent) ── -->
  <circle cx="830" cy="205" r="24" fill="#FBBC05"/>
  <circle cx="830" cy="200" r="10" fill="white" opacity="0.35"/>
  <circle cx="830" cy="205" r="8" fill="white" opacity="0.85"/>
</svg>
