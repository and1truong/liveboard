<?xml version="1.0" encoding="UTF-8"?>
<svg width="480" height="320" viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
  <!-- LiveBoard Logo — Primary (stacked) — Google-style -->

  <!-- Board icon centered -->
  <g transform="translate(176, 40)">
    <!-- Column 1 — Blue -->
    <rect x="0" y="0" width="36" height="120" rx="7" fill="#4285F4" opacity="0.15"/>
    <rect x="4" y="8" width="28" height="22" rx="5" fill="#4285F4"/>
    <rect x="4" y="34" width="28" height="32" rx="5" fill="#4285F4"/>
    <rect x="4" y="70" width="28" height="16" rx="5" fill="#4285F4"/>

    <!-- Column 2 — Red -->
    <rect x="42" y="0" width="36" height="120" rx="7" fill="#EA4335" opacity="0.15"/>
    <rect x="46" y="8" width="28" height="16" rx="5" fill="#EA4335"/>
    <rect x="46" y="28" width="28" height="26" rx="5" fill="#EA4335"/>

    <!-- Column 3 — Green -->
    <rect x="84" y="0" width="36" height="120" rx="7" fill="#34A853" opacity="0.15"/>
    <rect x="88" y="8" width="28" height="28" rx="5" fill="#34A853"/>
    <rect x="88" y="40" width="28" height="16" rx="5" fill="#34A853"/>
    <rect x="88" y="60" width="28" height="22" rx="5" fill="#34A853"/>
  </g>

  <!-- Wordmark -->
  <text x="240" y="220" text-anchor="middle" font-family="Google Sans, Product Sans, Inter, Helvetica Neue, Arial, sans-serif" font-size="56" font-weight="500" letter-spacing="-1">
    <tspan fill="#202124">Live</tspan><tspan fill="#4285F4">Board</tspan>
  </text>

  <!-- Tagline -->
  <text x="240" y="252" text-anchor="middle" font-family="Google Sans, Product Sans, Inter, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="400" fill="#5F6368" letter-spacing="0.5">
    Markdown-powered Kanban
  </text>
</svg>
