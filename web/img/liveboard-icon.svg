<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- LiveBoard Logo — Icon only (for favicon / avatar) -->

  <!-- Board container -->
  <rect x="10" y="16" width="108" height="96" rx="14" fill="none" stroke="#4338ca" stroke-width="3"/>

  <!-- Column dividers -->
  <line x1="46" y1="28" x2="46" y2="100" stroke="#4338ca" stroke-width="0.8" opacity="0.25"/>
  <line x1="82" y1="28" x2="82" y2="100" stroke="#4338ca" stroke-width="0.8" opacity="0.25"/>

  <!-- Col 1: 3 cards -->
  <rect x="18" y="32" width="22" height="8" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="18" y="44" width="22" height="8" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="18" y="56" width="22" height="8" rx="2" fill="#6366f1" opacity="0.5"/>

  <!-- Col 2: 2 cards -->
  <rect x="53" y="32" width="22" height="8" rx="2" fill="#6366f1" opacity="0.7"/>
  <rect x="53" y="44" width="22" height="8" rx="2" fill="#6366f1" opacity="0.7"/>

  <!-- Col 3: 1 card -->
  <rect x="88" y="32" width="22" height="8" rx="2" fill="#6366f1"/>

  <!-- Live broadcast dot -->
  <circle cx="110" cy="22" r="8" fill="#6366f1" opacity="0.7"/>
  <circle cx="110" cy="22" r="5" fill="#6366f1"/>
  <circle cx="110" cy="22" r="2.5" fill="#ffffff"/>
</svg>
