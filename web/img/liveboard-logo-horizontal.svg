<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <!-- LiveBoard Logo — Horizontal variant -->

  <!-- Mini board icon -->
  <rect x="16" y="14" width="56" height="44" rx="8" fill="none" stroke="#4338ca" stroke-width="2"/>
  <line x1="35" y1="22" x2="35" y2="52" stroke="#4338ca" stroke-width="0.5" opacity="0.25"/>
  <line x1="52" y1="22" x2="52" y2="52" stroke="#4338ca" stroke-width="0.5" opacity="0.25"/>

  <!-- Col 1: 3 cards -->
  <rect x="22" y="24" width="10" height="4" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="22" y="31" width="10" height="4" rx="1" fill="#6366f1" opacity="0.5"/>
  <rect x="22" y="38" width="10" height="4" rx="1" fill="#6366f1" opacity="0.5"/>

  <!-- Col 2: 2 cards -->
  <rect x="39" y="24" width="10" height="4" rx="1" fill="#6366f1" opacity="0.7"/>
  <rect x="39" y="31" width="10" height="4" rx="1" fill="#6366f1" opacity="0.7"/>

  <!-- Col 3: 1 card -->
  <rect x="56" y="24" width="10" height="4" rx="1" fill="#6366f1"/>

  <!-- Live dot -->
  <circle cx="68" cy="18" r="4" fill="#6366f1" opacity="0.7"/>
  <circle cx="68" cy="18" r="2.2" fill="#6366f1"/>
  <circle cx="68" cy="18" r="1" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="90" y="48" font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="36" letter-spacing="-0.5">
    <tspan font-weight="600" fill="#4338ca">Live</tspan><tspan font-weight="300" fill="#2C2C2A">Board</tspan>
  </text>
</svg>
