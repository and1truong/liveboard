<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <!-- LiveBoard Logo — Horizontal variant — Google-style -->

  <!-- Mini board icon -->
  <g transform="translate(8, 8)">
    <!-- Column 1 — Blue -->
    <rect x="0" y="0" width="18" height="64" rx="4" fill="#4285F4" opacity="0.15"/>
    <rect x="2" y="4" width="14" height="12" rx="3" fill="#4285F4"/>
    <rect x="2" y="20" width="14" height="17" rx="3" fill="#4285F4"/>
    <rect x="2" y="41" width="14" height="9" rx="3" fill="#4285F4"/>

    <!-- Column 2 — Red -->
    <rect x="22" y="0" width="18" height="64" rx="4" fill="#EA4335" opacity="0.15"/>
    <rect x="24" y="4" width="14" height="9" rx="3" fill="#EA4335"/>
    <rect x="24" y="17" width="14" height="14" rx="3" fill="#EA4335"/>

    <!-- Column 3 — Green -->
    <rect x="44" y="0" width="18" height="64" rx="4" fill="#34A853" opacity="0.15"/>
    <rect x="46" y="4" width="14" height="15" rx="3" fill="#34A853"/>
    <rect x="46" y="23" width="14" height="9" rx="3" fill="#34A853"/>
    <rect x="46" y="36" width="14" height="12" rx="3" fill="#34A853"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="52" font-family="Google Sans, Product Sans, Inter, Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="500" letter-spacing="-0.5">
    <tspan fill="#202124">Live</tspan><tspan fill="#4285F4">Board</tspan>
  </text>
</svg>
