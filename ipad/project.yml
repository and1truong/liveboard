name: LiveBoard
options:
  bundleIdPrefix: com.liveboard
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2"  # iPad only
    SUPPORTS_MACCATALYST: false

targets:
  LiveBoard:
    type: application
    platform: iOS
    sources:
      - LiveBoard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liveboard.app
        INFOPLIST_FILE: LiveBoard/Info.plist
        CODE_SIGN_ENTITLEMENTS: LiveBoard/LiveBoard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: "HUDZYUG6BU"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        # iPad multitasking support
        UIRequiresFullScreen: false
        UISupportsMultipleWindows: true
    dependencies:
      - framework: Gobridge.xcframework
        embed: true
    preBuildScripts:
      - name: "Build Go Framework"
        script: |
          if [ ! -d "${PROJECT_DIR}/Gobridge.xcframework" ]; then
            echo "error: Gobridge.xcframework not found. Run 'make ipad-framework' from the project root first."
            exit 1
          fi
        basedOnDependencyAnalysis: false
