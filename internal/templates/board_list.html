{{define "content"}}
<div class="board-list">
    <div class="workspace-header">
        <h2 class="workspace-title">My Boards</h2>
        <button onclick="var f=document.getElementById('createBoardForm');f.style.display='';f.querySelector('input[name=name]').focus()" class="btn-primary">+ New Board</button>
    </div>

    <div class="workspace-body">
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}

        <form id="createBoardForm" style="display:none" live-submit="create-board" class="create-board-form" onsubmit="var f=this;requestAnimationFrame(function(){f.style.display='none';f.reset()})">
            <input type="text" name="name" placeholder="Board name" required onkeydown="if(event.key==='Escape'){this.value='';this.closest('form').style.display='none'}">
            <button type="submit" class="btn-primary">Create</button>
            <button type="button" onclick="var f=this.closest('form');f.reset();f.style.display='none'" class="btn-secondary">Cancel</button>
        </form>

        {{if .Boards}}
        <div class="boards-grid">
            {{range .Boards}}
            <div class="board-card">
                <a href="/board/{{.Slug}}" class="board-link">
                    <h3>{{.Name}}</h3>
                    {{if .Description}}
                    <p class="description">{{.Description}}</p>
                    {{end}}
                    <p class="card-count">{{.CardCount}} cards</p>
                </a>
                <button onclick="if(confirm('Delete board &quot;{{.Name}}&quot;? This cannot be undone.')) { window.Live.send('delete-board', {name: '{{.Name}}'}); }" class="btn-delete">Delete</button>
            </div>
            {{end}}
        </div>
        {{else}}
        <div class="empty-state">
            <p>No boards yet. Create your first board to get started!</p>
        </div>
        {{end}}
    </div>
</div>
{{end}}
