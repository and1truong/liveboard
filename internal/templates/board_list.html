{{define "content"}}
<div class="board-list" x-data="{ creating: false }">
    <div class="workspace-header">
        <h2 class="workspace-title">My Boards</h2>
        <button @click="creating = true" class="btn-primary">+ New Board</button>
    </div>

    <div class="workspace-body">
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}

        <form x-show="creating" live-submit="create-board" class="create-board-form">
            <input type="text" name="name" placeholder="Board name" required autofocus>
            <button type="submit" class="btn-primary">Create</button>
            <button type="button" @click="creating = false" class="btn-secondary">Cancel</button>
        </form>

        {{if .Boards}}
        <div class="boards-grid">
            {{range .Boards}}
            <div class="board-card">
                <a href="/board/{{.Slug}}" class="board-link">
                    <h3>{{.Name}}</h3>
                    {{if .Description}}
                    <p class="description">{{.Description}}</p>
                    {{end}}
                    <p class="card-count">{{.CardCount}} cards</p>
                </a>
                <button onclick="if(confirm('Delete board &quot;{{.Name}}&quot;? This cannot be undone.')) { window.Live.send('delete-board', {name: '{{.Name}}'}); }" class="btn-delete">Delete</button>
            </div>
            {{end}}
        </div>
        {{else}}
        <div class="empty-state">
            <p>No boards yet. Create your first board to get started!</p>
        </div>
        {{end}}
    </div>
</div>
{{end}}
