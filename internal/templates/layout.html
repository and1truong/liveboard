<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/board.css">
    <script>
        (function() {
            var t = localStorage.getItem('lb_theme');
            if (t && t !== 'system') document.documentElement.setAttribute('data-theme', t);
            var w = localStorage.getItem('lb_column_width');
            if (w) document.documentElement.style.setProperty('--column-width', w + 'px');
        })();
    </script>
    <script src="/live.js"></script>
    <script src="/static/js/drag.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar" id="appSidebar">
            <div class="app-brand">
                <a href="/" class="brand-link">
                    <span class="brand-icon">&#9644;</span>
                    <span class="brand-name">LiveBoard</span>
                </a>
                <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="1" width="5" height="14" rx="1.5" fill="currentColor" opacity="0.9"/>
                        <rect x="8" y="1" width="7" height="14" rx="1.5" fill="currentColor" opacity="0.35"/>
                    </svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Boards</div>
                {{range .Boards}}
                <a href="/board/{{.Slug}}" class="sidebar-nav-item{{if eq $.BoardSlug .Slug}} active{{end}}">
                    <span class="nav-icon">&#9783;</span>
                    <span class="nav-label">{{.Name}}</span>
                </a>
                {{end}}
                <a href="/" class="sidebar-nav-item sidebar-new-board">
                    <span class="nav-icon">+</span>
                    <span class="nav-label">New Board</span>
                </a>
            </nav>
            <div class="sidebar-board-dropdown">
                <select onchange="if(this.value)window.location.href=this.value">
                    <option value="">Boards</option>
                    {{range .Boards}}
                    <option value="/board/{{.Slug}}"{{if eq $.BoardSlug .Slug}} selected{{end}}>{{.Name}}</option>
                    {{end}}
                    <option value="/">+ New Board</option>
                </select>
            </div>
            <div class="sidebar-footer">
                <div class="connection-status">
                    <span class="live-connected">&#9679; Live</span>
                    <span class="live-disconnected">&#9679; Offline</span>
                </div>
                <a href="/settings" class="sidebar-nav-item sidebar-settings-link{{if eq $.BoardSlug "__settings__"}} active{{end}}">
                    <span class="nav-icon">&#9881;</span>
                    <span class="nav-label">Settings</span>
                </a>
            </div>
        </aside>
        <div class="app-workspace">
            <main class="workspace-content">
                {{template "content" .}}
            </main>
        </div>
    </div>
    <script>
        (function() {
            var sidebar = document.getElementById('appSidebar');
            var toggle = document.getElementById('sidebarToggle');
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                sidebar.classList.add('collapsed');
            }
            toggle.addEventListener('click', function() {
                sidebar.classList.toggle('collapsed');
                localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
            });
        })();
    </script>
</body>
</html>
