<!DOCTYPE html>
<html lang="en" {{if .Theme}}data-theme="{{.Theme}}"{{end}} {{if .ColorTheme}}data-color-theme="{{.ColorTheme}}"{{end}}>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.SiteName}}</title>
<style>
{{template "export-theme-vars"}}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--color-bg);color:var(--color-text-primary);padding:2rem}
h1{margin-bottom:1.5rem;font-size:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:var(--color-surface);border-radius:8px;padding:1.25rem;box-shadow:var(--shadow-card);text-decoration:none;color:inherit;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 8px rgba(0,0,0,.15)}
.card-icon{font-size:1.5rem;margin-bottom:.5rem}
.card-name{font-weight:600;font-size:1.1rem;margin-bottom:.25rem}
.card-desc{color:var(--color-text-secondary);font-size:.875rem;margin-bottom:.5rem}
.card-stats{font-size:.8rem;color:var(--color-text-muted)}
.tag{display:inline-block;background:var(--color-accent-muted);border-radius:3px;padding:1px 6px;font-size:.75rem;color:var(--color-accent-text);margin-right:4px}
</style>
</head>
<body>
<h1>{{.SiteName}}</h1>
<div class="grid">
{{range .Boards}}
<a class="card" href="{{.Slug}}.html">
  {{if .Icon}}<div class="card-icon">{{.Icon}}</div>{{end}}
  <div class="card-name">{{.Name}}</div>
  {{if .Description}}<div class="card-desc">{{.Description}}</div>{{end}}
  <div class="card-stats">{{.CardCount}} cards · {{.DoneCount}} done · {{.ColumnCount}} columns</div>
  {{if .Tags}}<div style="margin-top:.5rem">{{range .Tags}}<span class="tag">{{.}}</span>{{end}}</div>{{end}}
</a>
{{end}}
</div>
</body>
</html>
